name: Sync S4 Ladeinfrastruktur

on:
  schedule:
    - cron: '0 6 1 * *'   # monatlich, am 1. des Monats, 06:00 UTC
  workflow_dispatch:

jobs:
  sync-ladeinfrastruktur:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Ladeinfrastruktur sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/sync_sicht4.py
