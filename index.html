  const statusLabel = s4Status === 'amtlich/live' ? 'BNetzA amtlich/live'
    : s4Status === 'gemischt/pruefen' ? 'BNetzA + Benchmark prüfen'
    : 'Benchmark manuelle Erhebung';
  const generated = s4Data?.generated_at ? new Date(s4Data.generated_at).toLocaleString('de-DE') : 'noch nicht synchronisiert';

  return (

        </div>
        <div className="row gap-sm">
          <span className={`status-badge ${useApi?'st-live':'st-manu'}`}>{statusLabel}</span>
          <span className="status-badge st-auto">{sumLadepunkte} Ladepunkte</span>
        </div>

      <div className="kpi-grid mb">
        <div className="kpi"><div className="kpi-label">Sicht 4 Status</div><div className="kpi-value" style={{fontSize:22}}>{useApi?'amtlich':'Benchmark'}</div><div className="kpi-sub">{s4Kommune?.status_message || 'manuelle Basisdaten'}</div></div>
        <div className="kpi"><div className="kpi-label">Ladepunkte</div><div className="kpi-value num">{sumLadepunkte}</div><div className="kpi-sub">{useApi ? `${s4Kommune?.ladeeinrichtungen || apiPoints.length} Ladeeinrichtungen` : 'lokale Benchmark-Punkte'}</div></div>
        <div className="kpi"><div className="kpi-label">pro 1.000 EW</div><div className="kpi-value num">{ladePro1000}</div><div className="kpi-sub">Benchmark: {s4Kommune?.benchmark_ladepunkte_pro_1000_ew ?? '–'}</div></div>
        <div className="kpi"><div className="kpi-label">Letzter Sync</div><div className="kpi-value" style={{fontSize:18}}>{generated}</div><div className="kpi-sub">Quelle: BNetzA CSV + OSM Grenze</div></div>
      </div>

      {s4Error && <div className="card card-pad mb" style={{borderLeft:'4px solid var(--warn)'}}><b>Hinweis:</b> {s4Error}</div>}
      {s4Kommune && !useApi && <div className="card card-pad mb" style={{borderLeft:'4px solid var(--warn)'}}>
        <b>Fallback aktiv:</b> API/Grenze liefert für {kommuneName} nicht genug belastbare Treffer. Deshalb zeigt die Karte die manuelle Benchmark-Erhebung und nicht leere oder falsche Live-Punkte.
      </div>}

      <div className="card card-pad mb">
        <div className="card-head">
          <div className="card-title">Gemeinde · Kartenlayer</div>
          <div className="row gap-xs">
            {ORTSTEILE.slice(0,6).map(o => (

        <div className="map-outer">
          <div id="ks-map" ref={mapRef}></div>
          <div className="map-layer-ctrl">

              <button key={l.id} className={`layer-btn ${activeL.has(l.id)?'active':''}`}
                onClick={() => toggleLayer(l.id)}>{l.label}</button>

          </div>
          <div className="map-legend-box">
            <div style={{fontWeight:700,fontSize:11,marginBottom:6}}>Legende</div>
            <div className="legend-li"><span className="ldot" style={{background:'#0B2545'}}></span>Ortsteil</div>
            <div className="legend-li"><span className="ldot" style={{background:'#0E7C5A'}}></span>Ladepunkt amtlich/live</div>
            <div className="legend-li"><span className="ldot" style={{background:'#B45309'}}></span>Ladepunkt Benchmark</div>
            <div className="legend-li"><span className="ldot" style={{background:'#1E4D8B',opacity:.6}}></span>Breitband ≥400</div>
            <div className="legend-li"><span className="ldot" style={{background:'#6B3E94'}}></span>Schule/Kita</div>

        </div>
      </div>
      <div className="card mb">
        <div className="card-head"><span className="card-title">Sicht 4 · Tabelle 1 · E-Autos/E-Motorräder · {kommuneName}</span></div>

              ))}
              {!ladepunkte.length && <tr><td colSpan="6" style={{color:'var(--ink-4)'}}>Keine Ladepunkte gefunden und kein Benchmark vorhanden.</td></tr>}

        </div>
      </div>
      <div className="card mb">
        <div className="card-head"><span className="card-title">Sicht 4 · Tabelle 2 · E-Bikes/E-Scooter · {kommuneName}</span></div>
        <p style={{fontSize:12,color:'var(--ink-4)',padding:'0 16px 8px'}}>Quelle: OpenStreetMap (amenity=charging_station, bicycle/scooter=yes) — die Bundesnetzagentur erfasst nur E-Autos/E-Motorräder, daher separate Quelle für diese Kategorie.</p>
        {ebikeError && <p style={{fontSize:12,color:'var(--warn)',padding:'0 16px 8px'}}>Fehler beim Laden: {ebikeError}</p>}
        <div style={{overflowX:'auto'}}>
          <table className="data-table">
            <thead><tr><th>Ort der Ladestation</th><th>Anzahl Ladeplätze</th><th>Geschwindigkeit (kW)</th><th>Anbieter</th><th>Fahrzeugart</th></tr></thead>
            <tbody>
              {ebikeStations.slice(0,50).map((s,i) => (
                <tr key={i}>
                  <td style={{fontWeight:600}}>{s.adresse}</td>
                  <td className="num">{s.anzahl_ladeplaetze}</td>
                  <td className="num">{s.leistung_kw != null ? s.leistung_kw : '—'}</td>
                  <td>{s.anbieter}</td>
                  <td><span className="tag">{s.fahrzeugart}</span></td>
                </tr>
              ))}
              {!ebikeStations.length && !ebikeError && <tr><td colSpan="5" style={{color:'var(--ink-4)'}}>Keine E-Bike/E-Scooter-Ladestationen in OpenStreetMap gefunden.</td></tr>}
            </tbody>
          </table>

        </div>
      </div>
    </div>
  );
}

  const chartRef = React.useRef(null);
  const chartObj = React.useRef(null);
  React.useEffect(() => {
    if (!chartRef.current) return;
    if (chartObj.current) { chartObj.current.destroy(); chartObj.current = null; }
    chartObj.current = new Chart(chartRef.current, {
      type:'bar',
      data:{
        labels: SICHT_LABELS,
        datasets:[
          {label:'2025',data:data.s25,backgroundColor:'rgba(11,37,69,.6)',borderRadius:3},
          {label:'2026',data:data.s26,backgroundColor:'rgba(30,77,139,.85)',borderRadius:3},

        plugins:{legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:12}}},

                x:{grid:{display:false},ticks:{font:{size:10}}}}}
    });
  }, [sel]);

  const histChartRef = React.useRef(null);

/* ═══════════════════════════════════════════════════════════════
   API-TRANSPORT V1.2 · Sicht 2 und Sicht 10 direkt in Hauptwebsite
   Lädt die JSON-Dateien aus /data und fällt sauber auf Benchmark/Hinweis zurück.
   ═══════════════════════════════════════════════════════════════ */
function apiStatusClass(status) {
  const s = String(status || '').toLowerCase();
  if (s.includes('api_live') || s.includes('osm_live') || s.includes('amtlich') || s === 'ok') return 'st-live';
  if (s.includes('warn') || s.includes('gemischt') || s.includes('pruefen')) return 'st-fall';
  if (s.includes('benchmark')) return 'st-manu';
  return 'st-auto';
}
function useApiJson(path) {
  const [state, setState] = React.useState({loading:true, data:null, error:null});
  React.useEffect(() => {
    let cancel = false;
    setState({loading:true, data:null, error:null});
    fetch(path, {cache:'no-store'})
      .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => { if(!cancel) setState({loading:false, data, error:null}); })
      .catch(err => { if(!cancel) setState({loading:false, data:null, error:err.message}); });
    return () => { cancel = true; };
  }, [path]);
  return state;
}
/* Gleicher {loading,data,error}-Vertrag wie useApiJson, aber Quelle ist
   eine Supabase-Abfrage statt einer lokalen JSON-Datei. */
function useSupabaseJson(fetchFn) {
  const [state, setState] = React.useState({loading:true, data:null, error:null});
  React.useEffect(() => {
    let cancel = false;
    setState({loading:true, data:null, error:null});
    fetchFn()
      .then(data => { if(!cancel) setState({loading:false, data, error:null}); })
      .catch(err => { if(!cancel) setState({loading:false, data:null, error:err.message}); });
    return () => { cancel = true; };
  }, []);
  return state;
}
function findApiKommune(data, kommune) {
  return data?.kommunen?.find(x => x.kommune === kommune)
      || data?.kommunen?.find(x => String(x.kommune || '').replace(' (Geiseltal)','') === String(kommune || '').replace(' (Geiseltal)',''))
      || null;
}
function ApiNotice({error, fallbackText}) {
  if (!error) return null;
  return <div className="card card-pad mb" style={{borderLeft:'4px solid var(--warn)'}}>
    <b>Hinweis:</b> {fallbackText || 'API-JSON konnte nicht geladen werden.'}<br/>
    <span className="mono text-xs">{error}</span>
  </div>;
}

      {syncing && <div className="card card-pad mb"><div style={{fontWeight:600,fontSize:12,marginBottom:8}}>Sync läuft … {Math.round(syncProg)}%</div><div style={{height:6,background:'var(--surface-sunk)',borderRadius:3,overflow:'hidden'}}><div style={{width:`${syncProg}%`,height:'100%',background:'var(--primary)',transition:'width .3s',borderRadius:3}}></div></div></div>}
      <div className="kpi-grid mb">
        <div className="kpi"><div className="kpi-label">Aktive Quellen</div><div className="kpi-value num">8</div></div>
        <div className="kpi"><div className="kpi-label">Ø Qualität</div><div className="kpi-value num">90%</div></div>
        <div className="kpi"><div className="kpi-label">Letzter Sync</div><div className="kpi-value">04:12</div></div>
        <div className="kpi"><div className="kpi-label">Warnungen</div><div className="kpi-value num" style={{color:'var(--warn)'}}>1</div></div>

        <div className="card-head"><span className="card-title">API-Matrix · alle 8 Datenquellen</span></div>

                    <div style={{display:'flex',alignItems:'center',gap:6}}>

/* ═══════════════════════════════════════════════════════════════
   SICHT 3 · echte StreetView-Abdeckung als blaue Linien
   Google gibt die originalen Pegman-Blue-Lines nicht als Layer heraus.
   Daher: OSM-Straßen + Google StreetView Metadata API → eigene blaue Linien.
   ═══════════════════════════════════════════════════════════════ */
function Sicht3StreetviewLiveView({ kommune, setTab }) {
  const [data, setData] = React.useState(null);
  const [err, setErr] = React.useState(null);
  const [active, setActive] = React.useState(kommune || 'Leuna');
  const [selectedLine, setSelectedLine] = React.useState(null);
  const [roads, setRoads] = React.useState([]);
  const mapRef = React.useRef(null);
  const mapObj = React.useRef(null);
  const layerRef = React.useRef(null);

  React.useEffect(() => {
    setActive(kommune || 'Leuna');
  }, [kommune]);

  React.useEffect(() => {
    fetchSicht3FromSupabase()
      .then(j => setData(j))
      .catch(e => setErr(`Supabase-Daten für Sicht 3 nicht ladbar: ${e.message}`));
  }, []);

  React.useEffect(() => {
    fetchSicht3RoadsSummary(active)
      .then(rs => setRoads(rs))
      .catch(() => setRoads([]));
  }, [active]);

  const all = data?.kommunen || [];
  const rec = all.find(x => x.kommune === active) || all.find(x => x.kommune === kommune) || all[0];
  const seedK = KOMMUNEN.find(k => k.name === (rec?.kommune || active)) || KOMMUNEN.find(k => k.name === 'Leuna') || KOMMUNEN[0];
  const blueLines = rec?.blue_lines || [];
  const roadLines = rec?.road_lines || [];
  const lines = blueLines;

  React.useEffect(() => {
    if (!window.L || !mapRef.current || mapObj.current) return;
    mapObj.current = L.map(mapRef.current).setView([51.33, 12.0], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap', maxZoom:19}).addTo(mapObj.current);
    layerRef.current = L.layerGroup().addTo(mapObj.current);
  }, []);

  React.useEffect(() => {
    const m = mapObj.current; if (!m || !window.L) return;
    layerRef.current.clearLayers();
    const bounds = [];
    // Erst alle öffentlichen Straßen innerhalb der Gemeindegrenze grau anzeigen.
    roadLines.forEach(line => {
      const latlngs = (line.coords || []).map(c => [c[0], c[1]]);
      if (latlngs.length < 2) return;
      latlngs.forEach(x => bounds.push(x));
      L.polyline(latlngs, {color:'#9AA8BA', weight:2, opacity:0.38})
        .bindPopup(`<b>${line.name || 'Straßenabschnitt'}</b><br>${line.highway || ''}<br>${Math.round(line.length_m || 0)} m öffentliche OSM-Straße`)
        .addTo(layerRef.current);
    });
    // Danach nur streng positiv geprüfte Abschnitte blau darüberlegen.
    blueLines.forEach(line => {
      const latlngs = (line.coords || []).map(c => [c[0], c[1]]);
      if (latlngs.length < 2) return;
      latlngs.forEach(x => bounds.push(x));
      const poly = L.polyline(latlngs, {color:'#1A73E8', weight:5, opacity:0.9})
        .bindPopup(`<b>${line.name || 'Straßenabschnitt'}</b><br>${line.highway || ''}<br>${Math.round(line.length_m || 0)} m StreetView-verifiziert`)
        .on('click', () => setSelectedLine(line));
      poly.addTo(layerRef.current);
    });
    if (bounds.length) m.fitBounds(L.latLngBounds(bounds).pad(0.15));
    else if (seedK) m.setView([seedK.lat || 51.33, seedK.lng || seedK.lon || 12.0], 12);
  }, [data, active]);

  const previewPoint = selectedLine?.coords?.[Math.floor((selectedLine?.coords?.length || 1)/2)] || lines?.[0]?.coords?.[0];
  const iframeSrc = null; // Frontend-Key nicht hart codieren; Preview optional serverseitig aktivieren.

  return (
    <div className="fade-in">
      <div className="breadcrumb"><span>KommScan</span><span className="breadcrumb-sep">/</span><span>Sicht 3</span><span className="breadcrumb-sep">/</span><span>StreetView-Abdeckung</span></div>
      <div className="page-head">
        <div>
          <div className="page-eyebrow">Sicht 3 · Plattform · tatsächliche Straßenbild-Abdeckung</div>
          <h1 className="page-title">360° Streetview · Straßenabdeckung</h1>
          <p className="page-subtitle">Diese Ansicht zeigt keine Benchmark-Punktkarte mehr. Die Karte zeigt alle öffentlichen Straßen innerhalb der echten Gemeindegrenze und markiert automatisch verifizierte StreetView-Abschnitte blau. Der manuelle Benchmark bleibt der fachliche Vergleichswert.</p>
        </div>
        <button className="btn btn-secondary" onClick={() => setTab('detail')}>← Zurück</button>
      </div>

      {err && <div className="card card-pad mb" style={{borderLeft:'4px solid var(--warn)'}}><b>Hinweis:</b> {err}</div>}

      <div className="filter-bar">
        <span className="text-xs text-faint">Kommune</span>
        <select className="select" value={active} onChange={e=>setActive(e.target.value)}>
          {(all.length ? all : [{kommune:'Leuna'}, {kommune:'Querfurt'}, {kommune:'Bad Dürrenberg'}]).map(x => <option key={x.kommune}>{x.kommune}</option>)}
        </select>
        <span className={`status-badge ${rec?.status?.includes('api')?'st-live':'st-manu'}`}>{rec?.status || 'nicht synchronisiert'}</span>
        <span className="status-badge st-auto">{roadLines.length} öffentliche Straßen</span><span className="status-badge st-live">{blueLines.length} blau geprüft</span><span className="status-badge st-auto">geprüft: {rec?.roads_checked ?? '—'} / {rec?.roads_total ?? '—'}</span>
      </div>

      <div className="kpi-grid mb">
        <div className="kpi"><div className="kpi-label">Live-Proxy StreetView</div><div className="kpi-value num">{rec?.coverage_of_checked_percent ?? rec?.extrapolated_percent ?? rec?.covered_percent ?? '—'}<span className="kpi-unit">%</span></div><div className="kpi-sub">geprüfte Stichprobe / Hochrechnung · konservativ: {rec?.covered_percent ?? '—'}%</div></div>
        <div className="kpi"><div className="kpi-label">Benchmark 2024</div><div className="kpi-value num">{rec?.benchmark_percent ?? '—'}<span className="kpi-unit">%</span></div><div className="kpi-sub">manueller Vergleichswert</div></div>
        <div className="kpi"><div className="kpi-label">Öffentliche Straßen</div><div className="kpi-value num">{rec?.roads_total ?? '—'}</div><div className="kpi-sub">innerhalb der Gemeindegrenze</div></div>
        <div className="kpi"><div className="kpi-label">Metadata-Proben</div><div className="kpi-value num">{rec?.metadata_samples ?? '—'}</div><div className="kpi-sub">nahe OK: {rec?.metadata_ok ?? '—'} · Trefferquote: {rec?.metadata_hit_rate_percent ?? '—'}% · hochgerechnet: {rec?.extrapolated_percent ?? '—'}%</div></div>
      </div>

      <div className="grid-12 mb">
        <div className="card card-pad" style={{gridColumn:'span 8'}}>
          <div className="card-head">
            <div><div className="card-title">Echte Karte · alle Straßen innerhalb der Gemeindegrenze</div><div className="text-xs text-mute mt-xs">Grau = alle öffentlich zugänglichen OSM-Straßen innerhalb der Kommune. Blau = davon über Google Metadata API als StreetView-nah verifiziert. Keine Straßen aus Merseburg/Schkopau/Umfeld.</div></div>
          </div>
          <div className="map-outer" style={{height:520}}><div id="sicht3-map" ref={mapRef} style={{width:'100%',height:'100%'}}></div></div>
        </div>
        <div className="card card-pad" style={{gridColumn:'span 4'}}>
          <div className="card-title mb-sm">Street View Vorschau</div>
          <div className="text-xs text-mute mb-sm">Die Maps Embed API kann ein Street-View-Panorama im iframe zeigen. Die originalen Google-Blue-Lines sind aber kein frei nutzbarer Layer; deshalb zeichnen wir eigene blaue Linien.</div>
          <div className="empty" style={{textAlign:'left', lineHeight:1.7}}>Die Vorschau ist deaktiviert, damit kein API-Key im HTML steht. Die Karte links zeigt die berechneten Linien. Für eine echte iframe-Vorschau muss der Key serverseitig eingesetzt werden.</div>
          <div className="mt-sm text-xs text-faint">Hinweis: Google liefert keinen frei nutzbaren Blue-Line-Layer. Die blauen Linien hier sind eigene API-Proxy-Linien aus OSM-Straßen + Google-Metadata-Treffern.</div>
        </div>
      </div>

      {(() => {
        const fmt = m => (Math.round(m || 0)).toLocaleString('de-DE');
        const ALLOWED = new Set(['living_street', 'primary', 'residential', 'secondary', 'tertiary']);
        const covered = roads.filter(r => (r.laenge_abgedeckt_m || 0) > 0 && ALLOWED.has(r.highway_typ))
                             .sort((a, b) => (b.laenge_abgedeckt_m || 0) - (a.laenge_abgedeckt_m || 0));
        const uncovered = roads.filter(r => (r.laenge_nicht_abgedeckt_m || 0) > 0 && ALLOWED.has(r.highway_typ))
                               .sort((a, b) => (b.laenge_nicht_abgedeckt_m || 0) - (a.laenge_nicht_abgedeckt_m || 0));
        const sumCov = covered.reduce((s, r) => s + (r.laenge_abgedeckt_m || 0), 0);
        const sumUnc = uncovered.reduce((s, r) => s + (r.laenge_nicht_abgedeckt_m || 0), 0);
        const th = { textAlign: 'left', padding: '6px 8px', borderBottom: '1px solid var(--border)', fontWeight: 600 };
        const thR = { ...th, textAlign: 'right' };
        const td = { padding: '5px 8px', borderBottom: '1px solid var(--border)' };
        const tdR = { ...td, textAlign: 'right' };
        return (
          <div className="grid-12 mb">
            <div className="card card-pad" style={{ gridColumn: 'span 6' }}>
              <div className="card-head"><span className="card-title">Sicht 3 · Tabelle 1 · Abgedeckte Straßen · {active}</span></div>
              <div className="text-xs text-mute mb-sm">Straßen mit verifizierter StreetView-Abdeckung. Gesamt abgedeckt: {fmt(sumCov)} m · {covered.length} Straßen.</div>
              <div style={{ maxHeight: 320, overflow: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                  <thead><tr><th style={th}>Straßenname</th><th style={thR}>Strecke (m)</th></tr></thead>
                  <tbody>
                    {covered.length === 0 && <tr><td colSpan={2} style={{ padding: '10px 8px', color: 'var(--text-mute)' }}>Keine abgedeckten Straßen (noch nicht synchronisiert?).</td></tr>}
                    {covered.map((r, i) => <tr key={'c' + i}><td style={td}>{r.strassenname}</td><td style={tdR}>{fmt(r.laenge_abgedeckt_m)}</td></tr>)}
                  </tbody>
                </table>
              </div>
            </div>
            <div className="card card-pad" style={{ gridColumn: 'span 6' }}>
              <div className="card-head"><span className="card-title">Sicht 3 · Tabelle 2 · Nicht abgedeckte Straßen · {active}</span></div>
              <div className="text-xs text-mute mb-sm">Straßen ohne StreetView-Abdeckung. Gesamt nicht abgedeckt: {fmt(sumUnc)} m · {uncovered.length} Straßen.</div>
              <div style={{ maxHeight: 320, overflow: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                  <thead><tr><th style={th}>Straßenname</th><th style={thR}>Strecke (m)</th></tr></thead>
                  <tbody>
                    {uncovered.length === 0 && <tr><td colSpan={2} style={{ padding: '10px 8px', color: 'var(--text-mute)' }}>Keine nicht abgedeckten Straßen.</td></tr>}
                    {uncovered.map((r, i) => <tr key={'u' + i}><td style={td}>{r.strassenname}</td><td style={tdR}>{fmt(r.laenge_nicht_abgedeckt_m)}</td></tr>)}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('uebersicht');
  const [kommune, setKommune] = React.useState('Leuna');
  const k = KOMMUNEN.find(x => x.name === kommune) || KOMMUNEN[0];
  const sections = ['Analyse','Aktion','System','Bürger'];

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-head">
          <div className="brand">
            <div className="brand-logo">K</div>
            <div>
              <div className="brand-name">KommScan v3</div>
              <div className="brand-tag">Datenportal Sachsen-Anhalt · Top-10 Benchmark</div>
            </div>
          </div>
        </div>
        <div className="kommune-picker">
          <div className="kommune-picker-label">Aktive Kommune</div>
          <div className="kommune-picker-name">{k.name}</div>
          <div className="kommune-picker-meta">{k.landkreis} · Rang {k.rang} · Score {k.ges.toFixed(1)}</div>

        </div>
        <nav className="nav">

            <div key={sec}>
              <div className="nav-section">{sec}</div>
              {TABS.filter(t => t.section===sec).map(t => {
                const ic = I[t.icon] || I.data;

                    {React.cloneElement(ic, {size:15})}

                    {t.counter && <span className={`nav-counter${t.counter==='live'?' live':t.counter==='beta'?' beta':''}`}>{t.counter}</span>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div className="sidebar-foot">
          <div className="sync-card">
            <div className="sync-dot"></div>
            <div className="sync-text">Live · vor 2 Min · 8 APIs</div>
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="main-inner">
          {tab==='uebersicht'    && <UebersichtView kommune={kommune} setKommune={setKommune} setTab={setTab}/>}
          {tab==='detail'        && <DetailView kommune={kommune} setKommune={setKommune} setTab={setTab}/>}
          {tab==='ranking'       && <RankingView kommune={kommune} setKommune={setKommune} setTab={setTab}/>}
          {tab==='karte'         && <KarteView kommune={kommune}/>}
          {tab==='themen'        && <ThemenView kommune={kommune}/>}
          {tab==='zeitreihe'     && <ZeitreiheView kommune={kommune}/>}
          {tab==='foerder'       && <FoerderView kommune={kommune}/>}
          {tab==='massnahmen'    && <MassnahmenView kommune={kommune}/>}
          {tab==='ki'            && <KIView kommune={kommune} setKommune={setKommune} setTab={setTab}/>}
          {tab==='igek'          && <IgekWatchView/>}
          {tab==='quellen'       && <QuellenView2/>}
          {tab==='historie'      && <HistorieView/>}
          {tab==='admin'         && <AdminView/>}
          {tab==='export'        && <ExportView kommune={kommune}/>}
          {tab==='buerger'       && <BuergerView kommune={kommune}/>}
          {tab==='allris'        && <AllrisView kommune={kommune}/>}
          {tab==='bevoelk'       && <BevoelkView kommune={kommune}/>}
          {tab==='sicht_1' && <SichtDetailView sichtNr={1} kommune={kommune} setTab={setTab}/>}
          {tab==='sicht_2' && <Sicht2ApiView kommune={kommune}/>}
          {tab==='sicht_3' && <Sicht3StreetviewLiveView kommune={kommune} setTab={setTab}/>}
          {tab==='sicht_4' && <SichtDetailView sichtNr={4} kommune={kommune} setTab={setTab}/>}
          {tab==='sicht_5' && <SichtDetailView sichtNr={5} kommune={kommune} setTab={setTab}/>}
          {tab==='sicht_6' && <SichtDetailView sichtNr={6} kommune={kommune} setTab={setTab}/>}
          {tab==='sicht_7' && <SichtDetailView sichtNr={7} kommune={kommune} setTab={setTab}/>}

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
